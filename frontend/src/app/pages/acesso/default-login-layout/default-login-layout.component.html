<div
  class="login-page flex flex-col min-h-screen relative overflow-hidden bg-background transition-colors duration-300">
  <div class="login-static-bg absolute inset-0 z-0" aria-hidden="true"></div>

  <div class="login-deco login-deco--tr" aria-hidden="true"></div>
  <div class="login-deco login-deco--bl" aria-hidden="true"></div>
  <div class="login-deco-glow login-deco-glow--1" aria-hidden="true"></div>
  <div class="login-deco-glow login-deco-glow--2" aria-hidden="true"></div>

  <!-- Logo marca: maior e legível no canto superior esquerdo -->
  <div class="login-page__logo-wrap absolute z-10 left-4 sm:left-8 md:left-10 top-[4.25rem] sm:top-7 md:top-8 pointer-events-none">
    <img
      src="assets/logo_financia.png"
      alt="FinanciA"
      class="login-page__logo h-20 sm:h-24 md:h-28 lg:h-32 w-auto max-w-[320px] sm:max-w-[400px] md:max-w-[500px] object-contain object-left select-none drop-shadow-[0_8px_28px_rgba(242,183,5,0.18)]"
      width="500"
      height="160" />
  </div>

  <div class="theme-toggle" aria-label="Alternar tema">
    <button
      type="button"
      class="theme-switch-track"
      [attr.aria-pressed]="isDark"
      (click)="toggleTheme()"
      [title]="isDark ? 'Modo claro' : 'Modo escuro'">
      <span class="theme-switch-knob" [class.dark]="isDark"></span>
      <span class="theme-option" [class.active]="!isDark" aria-hidden="true"><mat-icon>light_mode</mat-icon></span>
      <span class="theme-option" [class.active]="isDark" aria-hidden="true"><mat-icon>dark_mode</mat-icon></span>
    </button>
  </div>

  <!-- Cartão só no centro -->
  <div
    class="login-page__center relative z-10 flex flex-1 w-full min-h-screen items-center justify-center px-4 sm:px-6 pt-[8.25rem] sm:pt-28 pb-10 sm:pb-12">
    <div class="login-page__card-col w-full max-w-[380px] shrink-0">
      <mat-card
        class="login-shell-card supimpa-card w-full rounded-[1.75rem] border-2 border-loginCardBorder bg-loginCard text-loginCardText shadow-loginCard backdrop-blur-md transition-colors duration-300 px-6 py-7 sm:px-8 sm:py-8">
        <div class="text-loginCardText text-left">
          <div class="access-brand-head mb-5 sm:mb-6">
            <img
              src="assets/cerebro.png"
              alt=""
              class="mx-auto h-24 sm:h-28 w-auto object-contain select-none pointer-events-none drop-shadow-[0_0_28px_rgba(242,183,5,0.5)]"
              width="180"
              height="180" />
            <h1 class="mt-3 text-center text-2xl sm:text-[1.7rem] font-semibold leading-tight tracking-tight">
              <span class="text-loginCardText">financ</span><span class="text-ouro text-[1.18em] font-extrabold">IA</span>
            </h1>
          </div>
          <ng-content></ng-content>
        </div>
      </mat-card>

      <div
        class="action-buttons w-full mt-4 px-0.5"
        *ngIf="primaryBtnText || secondaryBtnText">
        <button
          type="button"
          (click)="onPrimaryClick()"
          class="primary-btn btn-primary-page"
          [disabled]="disablePrimaryBtn || primaryBtnLoading"
          *ngIf="primaryBtnText">
          <span *ngIf="primaryBtnLoading" class="spinner-dot"></span>
          <span>{{ primaryBtnText }}</span>
        </button>
        <button
          type="button"
          (click)="onSecondaryClick()"
          class="secondary-btn secondary-btn-outline"
          *ngIf="secondaryBtnText">
          {{ secondaryBtnText }}
        </button>
      </div>
    </div>
  </div>
</div>
