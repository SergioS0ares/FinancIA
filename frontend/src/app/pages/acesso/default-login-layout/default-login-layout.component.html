<div class="login-page">
  <div class="login-static-bg" aria-hidden="true"></div>

  <div class="theme-toggle" aria-label="Alternar tema">
    <button
      type="button"
      class="theme-switch-track"
      [attr.aria-pressed]="isDark"
      (click)="toggleTheme()"
      [title]="isDark ? 'Modo claro' : 'Modo escuro'">
      <span class="theme-switch-knob" [class.dark]="isDark"></span>
      <span class="theme-option" [class.active]="!isDark" aria-hidden="true"><mat-icon>light_mode</mat-icon></span>
      <span class="theme-option" [class.active]="isDark" aria-hidden="true"><mat-icon>dark_mode</mat-icon></span>
    </button>
  </div>

  <div class="login-page__center">
    <div class="login-page__card-col">
      <div class="login-page__rounded-block">
      <div class="login-page__cat-stack">
        <img
          src="assets/gato-sem-fundo.svg"
          alt=""
          class="login-page__cat"
          width="176"
          height="140" />

        <mat-card
        class="login-shell-card supimpa-card login-shell-card--with-cat w-full rounded-[1.5rem] sm:rounded-[1.75rem] border-2 border-loginCardBorder bg-loginCard text-loginCardText shadow-loginCard backdrop-blur-md transition-colors duration-300 px-5 py-5 sm:px-8 sm:py-6">
        <div class="text-loginCardText text-left">
          <div class="access-brand-head mb-4 sm:mb-5">
            <div class="access-brand-dots" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <h1 class="mt-1 text-center text-2xl sm:text-3xl font-semibold leading-tight tracking-tight">
              <span class="text-loginCardText">Financi</span><span class="text-ouro text-[1.12em] font-extrabold">A</span>
            </h1>
            <p *ngIf="screenSubtitle" class="access-screen-subtitle text-center text-xs sm:text-sm font-medium text-loginCardMuted mt-1.5 mb-0">
              FinanciA — {{ screenSubtitle }}
            </p>
            <p *ngIf="title && !screenSubtitle" class="access-screen-subtitle text-center text-xs sm:text-sm font-medium text-loginCardMuted mt-1.5 mb-0">
              {{ title }}
            </p>
          </div>
          <ng-content></ng-content>
        </div>
        </mat-card>
      </div>
      </div>

      <div
        class="action-buttons w-full mt-3 sm:mt-4 px-0.5"
        *ngIf="primaryBtnText || secondaryBtnText">
        <button
          type="button"
          (click)="onPrimaryClick()"
          class="primary-btn btn-primary-page"
          [disabled]="disablePrimaryBtn || primaryBtnLoading"
          *ngIf="primaryBtnText">
          <span *ngIf="primaryBtnLoading" class="spinner-dot"></span>
          <span>{{ primaryBtnText }}</span>
        </button>
        <button
          type="button"
          (click)="onSecondaryClick()"
          class="secondary-btn secondary-btn-outline"
          *ngIf="secondaryBtnText">
          {{ secondaryBtnText }}
        </button>
      </div>
    </div>
  </div>
</div>
