<app-default-login-layout>
  <div class="login-card page-card">
    <img src="/assets/png/LogoTavolaSimples.png" alt="Tavola" class="logo" />
    <h1 class="title">Bem-vindo de volta</h1>
    <p class="subtitle">Faça login na sua conta</p>
    <form [formGroup]="loginForm" (ngSubmit)="realizarLogin()" class="login-form page-form">
      <mat-form-field appearance="outline" class="full">
        <mat-label>E-mail ou telefone</mat-label>
        <input matInput formControlName="email" type="email" autocomplete="username" placeholder="Email ou telefone">
        <mat-error *ngIf="loginForm.get('email')?.invalid">Digite um e-mail válido</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="full">
        <mat-label>Senha</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="senha" autocomplete="current-password">
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword" aria-label="Alternar visibilidade da senha">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('senha')?.invalid">Senha obrigatória</mat-error>
      </mat-form-field>
      <div class="forgot-row">
        <a href="#" (click)="forgotPassword(); $event.preventDefault();" class="link-primary">Esqueceu a senha?</a>
      </div>
      <div *ngIf="showLoginError" class="login-error text-danger">Credenciais inválidas</div>
      <button mat-raised-button type="submit" class="btn-primary-page full-width" [disabled]="!loginForm.valid">
        Entrar
      </button>
      <p class="divider">ou entre com</p>
      <div class="socials">
        <div #googleButton style="display: flex; justify-content: center; width: 100%; margin-bottom: 12px;"></div>
        <button mat-stroked-button type="button" class="social facebook" aria-label="Entrar com Facebook">
          <span class="facebook-icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></span>
          <span>Facebook</span>
        </button>
      </div>
      <p class="signup-link link-muted">Não tem conta? <a (click)="irParaCadastro()" class="link-primary">Cadastre-se</a></p>
    </form>
  </div>
</app-default-login-layout>
