<app-default-login-layout>
  <p class="text-center text-sm text-loginCardMuted mb-6 sm:mb-7">Entre com seu e-mail e senha</p>

  <form [formGroup]="loginForm" (ngSubmit)="realizarLogin()" class="login-form access-login-form flex flex-col gap-1">
    <mat-form-field appearance="outline" class="full access-field w-full">
      <mat-label>E-mail ou CPF</mat-label>
      <mat-icon matPrefix class="access-field-icon text-loginCardMuted">mail</mat-icon>
      <input
        matInput
        formControlName="email"
        type="email"
        autocomplete="username"
        placeholder="E-mail ou CPF" />
      <mat-error *ngIf="loginForm.get('email')?.invalid">Digite um e-mail válido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full access-field w-full">
      <mat-label>Senha</mat-label>
      <mat-icon matPrefix class="access-field-icon text-loginCardMuted">lock</mat-icon>
      <input
        matInput
        [type]="hidePassword ? 'password' : 'text'"
        formControlName="senha"
        autocomplete="current-password"
        placeholder="Senha" />
      <button
        mat-icon-button
        matSuffix
        type="button"
        (click)="hidePassword = !hidePassword"
        aria-label="Alternar visibilidade da senha">
        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error *ngIf="loginForm.get('senha')?.invalid">Senha obrigatória</mat-error>
    </mat-form-field>

    <div class="flex justify-end mt-1 mb-4">
      <a
        href="#"
        (click)="forgotPassword(); $event.preventDefault()"
        class="text-sm font-medium text-ouro hover:underline">
        Esqueceu sua senha?
      </a>
    </div>

    <div *ngIf="showLoginError" class="login-error text-red-600 text-sm text-center py-2 px-3 rounded-lg bg-red-50 mb-2">
      Credenciais inválidas
    </div>

    <button
      type="submit"
      mat-flat-button
      class="!w-full !min-h-[52px] !rounded-xl !bg-ouro !text-stone-900 !font-bold !text-base !shadow-[0_4px_24px_rgba(242,183,5,0.45)] hover:!brightness-110"
      [disabled]="!loginForm.valid">
      Entrar
    </button>

    <div class="flex items-center gap-3 my-5 text-loginCardMuted text-xs sm:text-sm">
      <span class="h-px flex-1 bg-loginCardBorder/25 dark:bg-white/15"></span>
      <span class="shrink-0">Ou continuar com</span>
      <span class="h-px flex-1 bg-loginCardBorder/25 dark:bg-white/15"></span>
    </div>

    <div class="socials access-socials flex flex-col gap-3">
      <div #googleButton class="google-signin-host w-full flex justify-center min-h-[44px]"></div>
      <button
        mat-stroked-button
        type="button"
        class="social social-facebook w-full min-h-[44px] flex items-center justify-center gap-2.5 !normal-case !rounded-xl !px-4"
        aria-label="Entrar com Facebook">
        <span class="facebook-icon shrink-0" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" class="block">
            <path
              fill="currentColor"
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
          </svg>
        </span>
        <span class="font-medium text-sm">Facebook</span>
      </button>
    </div>

    <p class="signup-link text-center text-sm text-loginCardMuted mt-6 mb-0">
      Não tem uma conta?
      <a (click)="irParaCadastro()" class="link-primary font-semibold underline cursor-pointer">Criar uma conta</a>
    </p>
  </form>
</app-default-login-layout>
