<h2 mat-dialog-title class="!text-textPrimary !font-bold">Nova Transação</h2>

<mat-dialog-content class="!pt-4">
  <form [formGroup]="form" class="flex flex-col gap-4">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Tipo</mat-label>
      <mat-select formControlName="tipo">
        <mat-option value="receita">Receita</mat-option>
        <mat-option value="despesa">Despesa</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Valor</mat-label>
      <input matInput type="number" formControlName="valor" placeholder="0.00" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Descrição</mat-label>
      <input matInput formControlName="descricao" placeholder="Ex: Conta de Luz" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Categoria</mat-label>
      <input matInput formControlName="categoria" placeholder="Ex: Moradia" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="!pb-4 !pr-6">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button
    mat-flat-button
    class="!bg-ouro !text-white"
    [disabled]="form.invalid || loading"
    (click)="salvar()"
  >
    {{ loading ? 'Salvando...' : 'Salvar' }}
  </button>
</mat-dialog-actions>
