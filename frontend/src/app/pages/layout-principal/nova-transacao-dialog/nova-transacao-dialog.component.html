<h2 mat-dialog-title class="nova-tx__title">Nova transação</h2>
<p class="nova-tx__subtitle">Cadastro rápido — tipo, valor, descrição e categoria</p>

<mat-dialog-content class="nova-tx__content">
  <form [formGroup]="form" class="nova-tx__form">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Tipo</mat-label>
      <mat-select formControlName="tipo">
        <mat-option value="receita">Receita</mat-option>
        <mat-option value="despesa">Despesa</mat-option>
      </mat-select>
      <mat-hint>Entrada ou saída de dinheiro</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Valor</mat-label>
      <input matInput type="number" formControlName="valor" min="0.01" step="0.01" placeholder="0,00" />
      <span matTextPrefix class="nova-tx__prefix">R$&nbsp;</span>
      <mat-hint>Montante da operação</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Descrição</mat-label>
      <input matInput formControlName="descricao" placeholder="Ex.: Aluguel, Uber, Conta de luz" autocomplete="off" />
      <mat-hint>Nome que identifica a transação</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Categoria</mat-label>
      <input matInput formControlName="categoria" placeholder="Ex.: Moradia, Transporte, Mercado" list="nova-tx-categorias" autocomplete="off" />
      <datalist id="nova-tx-categorias">
        <option value="Moradia"></option>
        <option value="Transporte"></option>
        <option value="Mercado"></option>
        <option value="Restaurantes"></option>
        <option value="Lazer"></option>
        <option value="Saúde"></option>
        <option value="Educação"></option>
        <option value="Salário"></option>
        <option value="Freelance"></option>
      </datalist>
      <mat-hint>Organize gastos e relatórios por categoria (opcional)</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Data e hora</mat-label>
      <input matInput type="datetime-local" formControlName="dataLocal" />
      <mat-hint>Quando a movimentação ocorreu</mat-hint>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="nova-tx__actions">
  <button mat-button mat-dialog-close type="button">Cancelar</button>
  <button
    mat-flat-button
    type="button"
    class="!bg-ouro !text-white"
    [disabled]="form.invalid || loading"
    (click)="salvar()"
  >
    {{ loading ? 'Salvando…' : 'Salvar' }}
  </button>
</mat-dialog-actions>
